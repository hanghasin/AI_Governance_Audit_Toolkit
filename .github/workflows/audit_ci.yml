name: AI Governance Continuous Audit

on: [push]

jobs:
  bias-audit-gate:
    runs-on: ubuntu-latest
    
    steps:
    - name: "1. Checkout repository"
      uses: actions/checkout@v3

    - name: "2. Setup Python environment"
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: "3. Install Audit Dependencies"
      run: pip install pandas

    - name: "4. Execute Data Pipeline"
      run: |
        python3 data_generator.py 
        python3 -c "import pandas as pd; import sqlite3; df = pd.read_csv('booking_logs_mock.csv'); conn = sqlite3.connect('audit.db'); df.to_sql('bookings', conn, index=False, if_exists='replace')"

    - name: "5. Compliance Gate: Bias Threshold Check"
      run: |
        python3 -c "import sqlite3; conn = sqlite3.connect('audit.db'); cur = conn.cursor(); cur.execute('SELECT AVG(final_price)/AVG(base_price) FROM bookings WHERE device_type=\"iPhone\"'); ratio = cur.fetchone()[0]; print(f'Current Bias Ratio: {ratio}'); exit(1 if ratio > 1.10 else 0)"